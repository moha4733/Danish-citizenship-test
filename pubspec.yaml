name: dansk_indfoedsret_test
description: A production-ready app to practice for the Danish citizenship test.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  in_app_purchase: ^3.1.13
  provider: ^6.1.1
  google_fonts: ^6.1.0
  intl: ^0.20.2
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/questions.json
